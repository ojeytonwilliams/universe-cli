name: Test
on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: "Lint and Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        with:
          run_install: true

      # Install Node 24
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Lint Files
        run: pnpm lint

      - name: Verify Build
        run: pnpm build

  tests:
    name: "Unit Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      # Checkout the Repo
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true

      # Install Node 24
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Run Tests
        run: pnpm test

  tests-e2e:
    name: "E2E Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      # Checkout the Repo
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          run_install: true

      # Install Node 24
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: e2e Tests
        run: pnpm test:e2e
